<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Gardenias Deli & Market — Seleccioná tu sucursal para acceder al menú digital.">
    <meta name="theme-color" content="#ffffff">
    <title>Gardenias | Elegí tu sucursal</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="landing.css">
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "wd35n8o541");
    </script>
</head>

<body class="landing-body">

    <div class="landing-wrapper">

        <!-- Header / Branding -->
        <header class="landing-header">
            <div class="landing-logo-wrap">
                <img src="src/img/logo-floral-nobackground.png" alt="Gardenias logo" class="landing-logo">
            </div>
            <h1 class="landing-brand">GARDENIAS</h1>
            <p class="landing-subtitle">DELI &amp; MARKET</p>
        </header>

        <!-- Branch Selection -->
        <main class="landing-main">
            <p class="landing-prompt">Elegí tu sucursal</p>

            <div class="branch-list">

                <a id="btn-leloir" href="menu.html?sucursal=leloir" class="branch-card">
                    <div class="branch-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-.3a1 1 0 0 1-.7-1.7L9 9h-.2a1 1 0 0 1-.8-1.7L12 3l4 4.3a1 1 0 0 1-.8 1.7H15l3 3.3a1 1 0 0 1-.7 1.7H17Z">
                            </path>
                            <path d="M12 22v-3"></path>
                        </svg>
                    </div>
                    <span class="branch-name">Parque Leloir</span>
                    <svg class="branch-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>

                <a id="btn-castelar" href="menu.html?sucursal=castelar" class="branch-card">
                    <div class="branch-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"></path>
                            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                            <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"></path>
                            <path d="M2 7h20"></path>
                            <path
                                d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7">
                            </path>
                        </svg>
                    </div>
                    <span class="branch-name">Castelar</span>
                    <svg class="branch-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>

                <a id="btn-pinamar" href="menu.html?sucursal=pinamar" class="branch-card">
                    <div class="branch-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 12a10.06 10.06 10 0 0-20 0Z"></path>
                            <path d="M12 12v8a2 2 0 0 0 4 0"></path>
                            <path d="M12 2v1"></path>
                        </svg>
                    </div>
                    <span class="branch-name">Pinamar</span>
                    <svg class="branch-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>

            </div>
        </main>

        <footer class="landing-footer">
            <p>Somos historias, somos Gardenias.</p>
        </footer>

    </div>

    <script>
        // Animate cards on load
        document.querySelectorAll('.branch-card').forEach((card, i) => {
            card.style.animationDelay = `${0.1 + i * 0.12}s`;
        });
    </script>
</body>

</html>
