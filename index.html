<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Gardenias Deli & Market — Seleccioná tu sucursal para acceder al menú digital.">
    <meta name="theme-color" content="#ffffff">
    <title>Gardenias | Elegí tu sucursal</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="landing.css">
</head>

<body class="landing-body">

    <div class="landing-wrapper">

        <!-- Header / Branding -->
        <header class="landing-header">
            <div class="landing-logo-wrap">
                <img src="src/img/logo-floral.png" alt="Gardenias logo" class="landing-logo">
            </div>
            <h1 class="landing-brand">GARDENIAS</h1>
            <p class="landing-subtitle">DELI &amp; MARKET</p>
        </header>

        <!-- Branch Selection -->
        <main class="landing-main">
            <p class="landing-prompt">Elegí tu sucursal</p>

            <div class="branch-list">

                <a id="btn-leloir" href="menu.html?sucursal=leloir" class="branch-card">
                    <div class="branch-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </div>
                    <span class="branch-name">Parque Leloir</span>
                    <svg class="branch-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>

                <a id="btn-castelar" href="menu.html?sucursal=castelar" class="branch-card">
                    <div class="branch-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </div>
                    <span class="branch-name">Castelar</span>
                    <svg class="branch-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>

                <a id="btn-pinamar" href="menu.html?sucursal=pinamar" class="branch-card">
                    <div class="branch-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <!-- wave icon for Pinamar (beach) -->
                            <path d="M2 12 C5 9, 8 15, 11 12 S17 9, 20 12 S23 15, 24 12"></path>
                            <path d="M2 17 C5 14, 8 20, 11 17 S17 14, 20 17 S23 20, 24 17"></path>
                        </svg>
                    </div>
                    <span class="branch-name">Pinamar</span>
                    <svg class="branch-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>

            </div>
        </main>

        <footer class="landing-footer">
            <p>Somos historias, somos Gardenias.</p>
        </footer>

    </div>

    <script>
        // Animate cards on load
        document.querySelectorAll('.branch-card').forEach((card, i) => {
            card.style.animationDelay = `${0.1 + i * 0.12}s`;
        });
    </script>
</body>

</html>
